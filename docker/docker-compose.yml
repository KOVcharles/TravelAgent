services:
  hommey:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    image: hommey:latest
    container_name: hommey-app
    ports:
      - "8000:8000"
    # 仓库根的 .env（含 HOMMEY_API_KEY 等机密）默认不会被 -f docker/ 调用方式读到，
    # 这里显式注入；environment: 段会覆盖 .env 里的本地开发值，确保容器内用 redis/postgres。
    env_file:
      - path: ../.env
        required: false
    environment:
      # HOMMEY_MODEL_NAME / HOMMEY_BASE_URL / HOMMEY_HEALTH_CHECK_TIMEOUT_SEC 故意不在此声明：
      # 同 embedding，它们由上面的 env_file(../.env) 提供。若用 ${VAR:-...} 重复声明，不带 --env-file
      # 启动时 ${VAR} 会解析为空并覆盖 .env 真值（BASE_URL 曾因此被打成 dashscope 默认地址）。
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      HOMMEY_SHORT_TERM_BACKEND: redis
      HOMMEY_REDIS_HOST: hommey-redis
      HOMMEY_REDIS_PORT: 6379
      HOMMEY_REDIS_PASSWORD: ""
      HOMMEY_LONG_TERM_BACKEND: postgres
      HOMMEY_POSTGRES_DSN: postgresql://hommey:${PG_PASSWORD:-hommey123}@hommey-postgres:5432/hommey
      # HOMMEY_EMBEDDING_*（backend/model/api_key/base_url/dimension）故意不在 environment: 声明：
      # 它们由上面的 env_file(../.env) 提供。若在此用 ${VAR:-...} 重复声明，不带 --env-file 启动时
      # ${VAR} 会解析为空，而 environment: 优先级高于 env_file，会把真值（尤其 API key）覆盖成空 → RAG 静默失效。
      HOMMEY_RAG_DOCUMENTS_DIR: /app/data/documents
      HOMMEY_RAG_KNOWLEDGE_BASE_PATH: /app/data/rag_knowledge
    volumes:
      - ../data/documents:/app/data/documents:ro
      - ../data/rag_knowledge:/app/data/rag_knowledge
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: python run_webui.py

  redis:
    image: redis:7-alpine
    container_name: hommey-redis
    volumes:
      - hommey_redis:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hommey-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hommey
      POSTGRES_PASSWORD: ${PG_PASSWORD:-hommey123}
      POSTGRES_DB: hommey
    volumes:
      - hommey_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hommey -d hommey"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  hommey_redis:
  hommey_pgdata:
