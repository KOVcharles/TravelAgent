version: 1.0.0
display_name: 合规差旅行程规划
category: workflow
intent: itinerary_planning
agent_name: itinerary_planning
user_facing: true
risk_level: medium
catalog_order: 30
tools: [active_trip_context, rag_retrieval, travel_information]
input_schema: schemas/input.json
output_schema: schemas/output.json
requires:
  - skill: event-collection
    purpose: 收集结构化出差事项
  - skill: ask-question
    purpose: 获取公司差旅制度证据
  - skill: query-info
    purpose: 查询目的地天气和公开交通信息
  - skill: check-trip-compliance
    purpose: 检查最终方案是否符合制度
execution:
  - skill: event-collection
    agent_name: event_collection
    priority: 1
    reason: 收集出差基础信息
    expected_output: 出发地、目的地、日期、工作地点和缺失信息
  - skill: ask-question
    agent_name: rag_knowledge
    priority: 2
    reason: 基于已收集的出差事项查询适用的公司差旅制度
    expected_output: 交通、住宿、补贴和报销政策证据
  - skill: query-info
    agent_name: information_query
    priority: 2
    reason: 基于已收集的出差事项查询目的地天气和公开交通信息
    expected_output: 带官方核验提醒的天气和路线级交通建议
  - skill: plan-trip
    agent_name: itinerary_planning
    priority: 3
    reason: 基于事项、制度和外部信息生成差旅行程
    expected_output: 结构化公司差旅行程建议
  - skill: check-trip-compliance
    agent_name: trip_compliance
    priority: 4
    reason: 依据知识库证据检查行程合规性
    expected_output: 合规结论、证据、风险和待确认事项
