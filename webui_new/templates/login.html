<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommey 商旅助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B1120;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* Animated gradient background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(99,102,241,0.06) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(2%, -2%); }
            66% { transform: translate(-2%, 1%); }
        }
        /* Grid pattern overlay */
        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }
        /* Glowing dot decoration */
        .glow-dot {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        /* Login card */
        .login-card {
            background: linear-gradient(135deg, rgba(30,41,59,0.9), rgba(15,23,42,0.95));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(51,65,85,0.6);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.05);
            transition: box-shadow 0.4s ease;
        }
        .login-card:hover {
            box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.1);
        }
        /* Brand gradient text */
        .brand-gradient {
            background: linear-gradient(135deg, #F1F5F9 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Input styling */
        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(15,23,42,0.6);
            border: 1px solid rgba(51,65,85,0.6);
            border-radius: 12px;
            color: #F1F5F9;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: all 0.25s ease;
        }
        .input-field::placeholder {
            color: #475569;
        }
        .input-field:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15), 0 0 20px rgba(59,130,246,0.05);
            background: rgba(15,23,42,0.8);
        }
        .input-field.error {
            border-color: #EF4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
        }
        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(59,130,246,0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Error message */
        .error-msg {
            color: #FCA5A5;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 6px;
        }
        .error-msg.visible { display: flex; }
        /* Entrance animation */
        .animate-in {
            animation: fadeSlideUp 0.6s ease forwards;
            opacity: 0;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        /* Shimmer effect */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
            border-radius: 24px;
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        /* Keyboard shortcut hint */
        .kbd {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 500;
            color: #64748B;
            background: rgba(51,65,85,0.4);
            border-radius: 4px;
            border: 1px solid rgba(51,65,85,0.5);
        }
    </style>
</head>
<body>
    <div class="grid-pattern"></div>

    <!-- Glowing decorations -->
    <div class="glow-dot" style="width:400px;height:400px;background:rgba(59,130,246,0.08);top:-100px;right:-100px;"></div>
    <div class="glow-dot" style="width:300px;height:300px;background:rgba(99,102,241,0.06);bottom:-50px;left:-50px;"></div>

    <!-- Login Card -->
    <div class="login-card animate-in delay-1">
        <div class="shimmer"></div>

        <!-- Logo & Brand -->
        <div style="text-align: center; margin-bottom: 36px;">
            <div style="display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #3B82F6, #6366F1); margin-bottom: 16px; box-shadow: 0 8px 24px rgba(59,130,246,0.25);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <h1 style="font-size: 26px; font-weight: 700; color: #F1F5F9; letter-spacing: -0.5px; margin-bottom: 4px;">Hommey</h1>
            <p style="color: #64748B; font-size: 14px; font-weight: 400;">智能差旅助手 · 让差旅更简单</p>
        </div>

        <!-- Input Form -->
        <form id="loginForm" autocomplete="off" style="margin-bottom: 24px;">
            <div style="margin-bottom: 4px;">
                <label for="userId" style="display: block; font-size: 13px; font-weight: 500; color: #94A3B8; margin-bottom: 8px;">
                    用户 ID
                </label>
                <input
                    id="userId"
                    class="input-field"
                    type="text"
                    placeholder="请输入您的用户 ID，如 zhangsan"
                    autocomplete="off"
                    spellcheck="false"
                    autofocus
                >
                <div id="errorMsg" class="error-msg">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span id="errorText">请输入有效的用户 ID</span>
                </div>
            </div>

            <button id="submitBtn" class="submit-btn" type="submit" style="margin-top: 20px;">
                <span id="btnText">进入系统</span>
                <span id="btnLoading" style="display:none;">
                    <span class="spinner"></span>
                    正在为您准备...
                </span>
            </button>
        </form>

        <!-- Footer hints -->
        <div style="text-align: center;">
            <p style="color: #475569; font-size: 13px; margin-bottom: 8px;">
                新用户将自动创建专属配置
            </p>
            <p style="color: #334155; font-size: 12px;">
                按 <span class="kbd">↵</span> Enter 快速进入
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const input = document.getElementById('userId');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.add('visible');
            input.classList.add('error');
        }

        function hideError() {
            errorMsg.classList.remove('visible');
            input.classList.remove('error');
        }

        function setLoading(loading) {
            if (loading) {
                btnText.style.display = 'none';
                btnLoading.style.display = 'inline';
                submitBtn.disabled = true;
            } else {
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        input.addEventListener('input', hideError);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitBtn.click();
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const userId = input.value.trim();
            if (!userId) {
                showError('请输入您的用户 ID');
                input.focus();
                return;
            }

            setLoading(true);

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    showError(err.detail || '登录失败，请重试');
                    setLoading(false);
                    return;
                }

                const data = await res.json();
                // Smooth transition to chat page
                document.querySelector('.login-card').style.transition = 'all 0.3s ease';
                document.querySelector('.login-card').style.opacity = '0';
                document.querySelector('.login-card').style.transform = 'translateY(-10px) scale(0.98)';

                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 300);
            } catch (err) {
                showError('网络错误，请检查连接后重试');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
