<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #26211c;
            --muted: #776f66;
            --paper: #fffaf2;
            --cream: #f8f2e8;
            --orange: #c65f24;
            --orange-deep: #974515;
            --line: rgba(43, 36, 28, 0.12);
            --dark: #25211d;
            --shadow: 0 24px 80px rgba(54, 42, 28, 0.12);
        }

        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(rgba(38,33,28,0.032) 1px, transparent 1px),
                linear-gradient(90deg, rgba(38,33,28,0.032) 1px, transparent 1px),
                radial-gradient(circle at 50% 46%, rgba(255,250,242,0.9), transparent 42%),
                linear-gradient(140deg, #fff9f0 0%, #f6ede1 56%, #fff5eb 100%);
            background-size: 64px 64px, 64px 64px, auto, auto;
        }

        .page {
            position: relative;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .nav {
            position: relative;
            z-index: 2;
            height: 78px;
            padding: 22px clamp(20px, 4vw, 54px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--ink);
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
        }

        .brand img {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            object-fit: cover;
            box-shadow: 0 10px 24px rgba(54, 42, 28, 0.1);
        }

        .hero {
            position: relative;
            z-index: 1;
            width: min(980px, calc(100vw - 36px));
            margin: 0 auto;
            min-height: calc(100vh - 78px);
            padding: 34px 0 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .kicker {
            color: var(--orange-deep);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 780px;
            margin: 18px 0 0;
            font-size: clamp(48px, 8vw, 104px);
            line-height: 0.94;
            letter-spacing: 0;
            font-weight: 800;
        }

        .sub {
            max-width: 580px;
            margin: 24px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.9;
        }

        .typing {
            min-height: 48px;
            margin-top: 32px;
            padding: 12px 17px;
            border-radius: 999px;
            background: rgba(255,255,255,0.74);
            border: 1px solid var(--line);
            color: #4c453d;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: min(620px, 100%);
            box-shadow: 0 12px 34px rgba(54,42,28,0.07);
        }

        .typing::after {
            content: "";
            width: 1px;
            height: 18px;
            margin-left: 3px;
            background: var(--orange);
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .login-form {
            width: min(720px, 100%);
            margin-top: 12px;
            padding: 7px;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr) auto;
            gap: 7px;
            border-radius: 999px;
            background: rgba(255,255,255,0.82);
            border: 1px solid rgba(255,255,255,0.76);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .input-field {
            min-width: 0;
            min-height: 48px;
            padding: 0 18px;
            border: 0;
            outline: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--ink);
            font: inherit;
            font-size: 15px;
        }

        .input-field::placeholder { color: #a89c91; }

        .submit-btn {
            min-width: 142px;
            min-height: 48px;
            padding: 0 22px;
            border: 0;
            border-radius: 999px;
            background: var(--dark);
            color: #fff8ef;
            font: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(37,33,29,0.18);
        }

        .submit-btn:disabled {
            cursor: wait;
            opacity: 0.72;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 15px;
            height: 15px;
            margin-right: 8px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff8ef;
            border-radius: 999px;
            vertical-align: -3px;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            min-height: 22px;
            margin-top: 12px;
            color: #a7473e;
            font-size: 13px;
            visibility: hidden;
        }

        .error-msg.visible { visibility: visible; }

        .auth-mode {
            margin-top: 24px;
            padding: 4px;
            display: inline-flex;
            gap: 4px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255,255,255,0.58);
        }

        .mode-btn {
            min-width: 82px;
            padding: 8px 16px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--dark);
            color: #fff8ef;
            box-shadow: 0 8px 20px rgba(37,33,29,0.14);
        }

        .mode-btn:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .route-line {
            position: fixed;
            left: 7vw;
            right: 7vw;
            bottom: 9vh;
            height: 130px;
            opacity: 0.48;
            pointer-events: none;
        }

        .route-line svg {
            width: 100%;
            height: 100%;
        }

        .corner-note {
            position: fixed;
            left: clamp(20px, 4vw, 54px);
            bottom: 28px;
            color: #9d9489;
            font-size: 12px;
            letter-spacing: 0.02em;
        }

        @media (max-width: 700px) {
            body { overflow: auto; }
            .nav {
                height: 68px;
                justify-content: center;
                padding: 18px 20px;
            }
            .hero {
                min-height: calc(100vh - 68px);
                padding: 26px 0 52px;
            }
            .login-form {
                grid-template-columns: 1fr;
                border-radius: 24px;
                padding: 8px;
            }
            .input-field {
                text-align: center;
                background: #fffaf2;
            }
            .submit-btn { width: 100%; }
            .route-line, .corner-note { display: none; }
        }
    </style>
</head>
<body>
    <main class="page">
        <nav class="nav" aria-label="Hommey">
            <a class="brand" href="/" aria-label="Hommey 首页">
                <img src="/static/assets/hommey-avatar.jpg" alt="">
                <span>Hommey</span>
            </a>
        </nav>

        <section class="hero">
            <div class="kicker">Travel intelligence</div>
            <h1>出差前，先问 Hommey。</h1>
            <p class="sub">说出目的地、时间和问题。Hommey 会把行程、差旅标准和你的偏好整理成更稳妥的建议。</p>

            <div
                id="typingText"
                class="typing"
                data-phrases="今天我要去上海出差，补贴标准是怎么样？|下周去深圳，两天一晚怎么安排更稳妥？|帮我查一下北京到杭州的高铁和住宿标准。|明早 9 点到虹桥，几点出门比较稳妥？|这次可以订一等座吗？帮我看一下差旅规则。|会议在静安寺附近，酒店选哪里更合适？|帮我把三天两晚的行程整理成可执行计划。|如果航班延误，帮我准备一个备选路线。"
            ></div>

            <div class="auth-mode" role="tablist" aria-label="登录或注册">
                <button id="loginModeBtn" class="mode-btn active" type="button" role="tab" aria-selected="true">登录</button>
                <button id="registerModeBtn" class="mode-btn" type="button" role="tab" aria-selected="false">注册</button>
            </div>

            <form id="loginForm" class="login-form" autocomplete="on">
                <input id="email" class="input-field" type="text" placeholder="邮箱（测试不限格式）" autocomplete="username" spellcheck="false" autofocus>
                <input id="password" class="input-field" type="password" placeholder="密码" autocomplete="current-password">
                <button id="submitBtn" class="submit-btn" type="submit">
                    <span id="btnText">进入 Hommey</span>
                    <span id="btnLoading" style="display:none;"><span class="spinner"></span>正在进入</span>
                </button>
            </form>
            <div id="errorMsg" class="error-msg">
                <span id="errorText">请输入邮箱和密码</span>
            </div>
        </section>

        <div class="route-line" aria-hidden="true">
            <svg viewBox="0 0 920 130" fill="none">
                <path d="M18 96 C 188 18, 320 120, 496 46 S 696 78, 902 24" stroke="#c65f24" stroke-width="2" stroke-dasharray="7 10"/>
                <circle cx="18" cy="96" r="5" fill="#c65f24"/>
                <circle cx="902" cy="24" r="5" fill="#c65f24"/>
            </svg>
        </div>
        <div class="corner-note">Private business travel assistant</div>
    </main>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const typingText = document.getElementById('typingText');
        const loginModeBtn = document.getElementById('loginModeBtn');
        const registerModeBtn = document.getElementById('registerModeBtn');
        let authMode = 'login';

        function showError(message) {
            errorText.textContent = message;
            errorMsg.classList.add('visible');
            (emailInput.value.trim() ? passwordInput : emailInput).focus();
        }

        function clearError() {
            errorMsg.classList.remove('visible');
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            loginModeBtn.disabled = loading;
            registerModeBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnLoading.style.display = loading ? 'inline' : 'none';
        }

        function setAuthMode(mode) {
            authMode = mode;
            const registering = mode === 'register';
            loginModeBtn.classList.toggle('active', !registering);
            registerModeBtn.classList.toggle('active', registering);
            loginModeBtn.setAttribute('aria-selected', String(!registering));
            registerModeBtn.setAttribute('aria-selected', String(registering));
            passwordInput.autocomplete = registering ? 'new-password' : 'current-password';
            btnText.textContent = registering ? '注册并进入' : '进入 Hommey';
            btnLoading.lastChild.textContent = registering ? '正在注册' : '正在进入';
            clearError();
        }

        function startTyping() {
            const phrases = typingText.dataset.phrases.split('|');
            let phraseIndex = 0;
            let charIndex = 0;
            let deleting = false;
            const typeSpeed = 76;
            const eraseSpeed = 34;
            const holdMs = 1900;

            function tick() {
                const phrase = phrases[phraseIndex];
                charIndex += deleting ? -1 : 1;
                typingText.textContent = phrase.slice(0, charIndex);

                if (!deleting && charIndex === phrase.length) {
                    deleting = true;
                    setTimeout(tick, holdMs);
                    return;
                }
                if (deleting && charIndex === 0) {
                    deleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    setTimeout(tick, 320);
                    return;
                }
                setTimeout(tick, deleting ? eraseSpeed : typeSpeed);
            }

            tick();
        }

        emailInput.addEventListener('input', clearError);
        passwordInput.addEventListener('input', clearError);
        loginModeBtn.addEventListener('click', () => setAuthMode('login'));
        registerModeBtn.addEventListener('click', () => setAuthMode('register'));

        function decodeJwtPayload(token) {
            const part = String(token || '').split('.')[1];
            if (!part) return null;
            const normalized = part.replace(/-/g, '+').replace(/_/g, '/');
            const padded = normalized + '='.repeat((4 - normalized.length % 4) % 4);
            try {
                return JSON.parse(decodeURIComponent(escape(atob(padded))));
            } catch (err) {
                return null;
            }
        }

        async function readError(response, fallback) {
            try {
                const body = await response.json();
                return body.error?.message || body.error || body.detail || fallback;
            } catch (err) {
                return fallback;
            }
        }

        async function login(email, password) {
            return fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) {
                showError('请输入邮箱和密码');
                return;
            }

            setLoading(true);
            try {
                if (authMode === 'register') {
                    const registerRes = await fetch('/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password }),
                    });
                    if (!registerRes.ok) {
                        showError(await readError(registerRes, '注册失败，请重试'));
                        setLoading(false);
                        return;
                    }
                    btnLoading.lastChild.textContent = '正在进入';
                }

                const res = await login(email, password);
                if (!res.ok) {
                    const fallback = authMode === 'register'
                        ? '注册成功，但自动登录失败，请切换到登录后重试'
                        : '登录失败，请重试';
                    showError(await readError(res, fallback));
                    setLoading(false);
                    return;
                }
                const data = await res.json();
                const payload = decodeJwtPayload(data.access_token);
                const userId = payload && payload.sub;
                if (!userId) {
                    showError('登录成功但无法读取用户身份，请联系管理员');
                    setLoading(false);
                    return;
                }
                localStorage.setItem('hommey.access_token', data.access_token);
                localStorage.setItem('hommey.refresh_token', data.refresh_token);
                localStorage.setItem('hommey.user_id', String(userId));
                window.location.href = `/chat/${encodeURIComponent(userId)}`;
            } catch (err) {
                showError('网络错误，请检查连接后重试');
                setLoading(false);
            }
        });

        startTyping();
    </script>
</body>
</html>
