<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Hommey</title>
    <link rel="stylesheet" href="/static/hommey.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-visual">
            <div class="auth-brand">
                <span class="mini-logo">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M6 12h12"/></svg>
                </span>
                <span>Hommey</span>
            </div>
            <div class="auth-story">
                <svg class="auth-route" viewBox="0 0 720 140" aria-hidden="true">
                    <path d="M20 92 C145 92, 180 20, 314 47 S510 124, 700 34"/>
                    <path class="active" d="M20 92 C145 92, 180 20, 314 47 S510 124, 700 34"/>
                </svg>
                <h1><span>把复杂差旅，</span><span>变成清楚的一程。</span></h1>
                <p>行程、企业标准和个人偏好，由 Hommey 在需要时为你整理。</p>
            </div>
        </section>

        <section class="auth-panel">
            <div class="auth-box">
                <h2 id="authTitle">欢迎回来</h2>
                <p id="authDescription">登录后继续你的差旅行程。</p>
                <div class="auth-tabs" role="tablist" aria-label="登录或注册">
                    <button id="loginModeBtn" class="auth-tab active" type="button" role="tab" aria-selected="true">登录</button>
                    <button id="registerModeBtn" class="auth-tab" type="button" role="tab" aria-selected="false">注册</button>
                </div>
                <form id="loginForm" class="auth-form" autocomplete="on">
                    <input id="email" class="auth-input" type="email" placeholder="邮箱地址" aria-label="邮箱地址" autocomplete="username" required>
                    <input id="password" class="auth-input" type="password" placeholder="密码" aria-label="密码" autocomplete="current-password" required>
                    <button id="submitBtn" class="auth-submit" type="submit">继续</button>
                </form>
                <div id="errorMsg" class="auth-error" role="alert"></div>
                <p class="auth-footnote">登录即表示你同意仅将账户用于 Hommey 差旅服务。</p>
            </div>
        </section>
    </main>
    <script src="/static/auth.js"></script>
</body>
</html>
