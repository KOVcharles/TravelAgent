<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommey - {{ user_id }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #211f1c;
            --muted: #766d63;
            --cream: #f8efe4;
            --paper: #fffaf3;
            --orange: #d76b1f;
            --orange-deep: #a64a13;
            --line: rgba(52, 43, 32, 0.13);
            --dark: #201f1d;
            --dark-soft: #2c2925;
            --shadow: 0 28px 86px rgba(66, 49, 30, 0.15);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 78% 12%, rgba(215,107,31,0.12), transparent 30%),
                linear-gradient(135deg, #fffaf3 0%, #f3e8d8 54%, #fff6ec 100%);
        }
        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(89, 77, 64, 0.26); border-radius: 999px; }

        .app-layout {
            width: min(1440px, 100vw);
            height: 100vh;
            margin: 0 auto;
            padding: 18px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 16px;
        }

        .desk,
        .docket {
            border: 1px solid rgba(255,255,255,0.74);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .desk {
            min-width: 0;
            border-radius: 34px;
            overflow: hidden;
            background: rgba(255,250,243,0.82);
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .chat-header {
            min-height: 104px;
            padding: 22px 26px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--line);
        }
        .assistant-avatar {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.78);
            box-shadow: 0 16px 32px rgba(83, 58, 31, 0.16);
            flex: 0 0 auto;
        }
        .eyebrow {
            color: var(--orange-deep);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .title-block h1 {
            margin: 4px 0 0;
            font-size: 24px;
            line-height: 1.1;
            letter-spacing: 0;
        }
        .title-block p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        .header-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 7px 11px 7px 7px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255,255,255,0.56);
            color: #4f463e;
            font-size: 13px;
            font-weight: 800;
        }
        .user-dot {
            width: 26px;
            height: 26px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: var(--dark);
            color: #fff7ee;
            font-size: 12px;
        }
        .logout-link {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: rgba(255,255,255,0.56);
            color: #655b52;
            text-decoration: none;
        }
        .logout-link:hover { color: var(--orange-deep); border-color: rgba(215,107,31,0.28); }

        .chat-messages {
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .message-row {
            display: flex;
            gap: 11px;
            align-items: flex-start;
            max-width: min(780px, 88%);
            animation: messageIn 0.24s ease;
        }
        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-row.ai { align-self: flex-start; }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-avatar {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            overflow: hidden;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
        }
        .msg-avatar.ai img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .msg-avatar.user {
            background: #fffaf3;
            color: var(--orange-deep);
            border: 1px solid rgba(215,107,31,0.22);
        }
        .msg-stack { max-width: 100%; }
        .msg-bubble {
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.78;
            word-break: break-word;
            box-shadow: 0 14px 28px rgba(72, 52, 30, 0.08);
        }
        .msg-bubble.ai {
            background: #fffaf3;
            border: 1px solid rgba(255,255,255,0.78);
            color: #312c26;
            border-bottom-left-radius: 7px;
        }
        .msg-bubble.user {
            background: var(--dark);
            color: #fff7ee;
            border-bottom-right-radius: 7px;
        }
        .msg-bubble strong { font-weight: 800; }
        .msg-time {
            margin-top: 6px;
            color: #a19589;
            font-size: 11px;
        }
        .message-row.user .msg-time { text-align: right; }

        .option-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .option-pill {
            min-height: 34px;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid rgba(215,107,31,0.22);
            background: #fffaf3;
            color: #574c42;
            font: inherit;
            font-size: 13px;
            cursor: pointer;
        }
        .option-pill:hover {
            border-color: rgba(215,107,31,0.5);
            color: var(--orange-deep);
        }
        .option-pill:disabled {
            cursor: default;
            opacity: 0.45;
        }
        .agent-indicator {
            min-width: 210px;
            padding: 15px 16px;
            border-radius: 18px 18px 18px 7px;
            background: #fffaf3;
            border: 1px solid rgba(255,255,255,0.78);
            box-shadow: 0 14px 28px rgba(72,52,30,0.08);
        }
        .agent-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .agent-tag {
            padding: 4px 9px;
            border-radius: 999px;
            background: rgba(215,107,31,0.11);
            color: var(--orange-deep);
            font-size: 11px;
            font-weight: 800;
        }
        .thinking-text { color: var(--muted); font-size: 13px; }
        .typing-dots { display: flex; gap: 4px; margin-top: 9px; }
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: var(--orange);
            animation: dotBounce 1.1s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
            40% { transform: translateY(-4px); opacity: 1; }
        }

        .chat-input-area {
            padding: 18px 24px 24px;
            border-top: 1px solid var(--line);
        }
        .input-wrapper {
            min-height: 60px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 8px;
            border-radius: 20px;
            background: #fffaf3;
            border: 1px solid var(--line);
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .input-wrapper:focus-within {
            border-color: rgba(215,107,31,0.48);
            box-shadow: 0 0 0 4px rgba(215,107,31,0.1);
        }
        .chat-input {
            flex: 1;
            max-height: 128px;
            resize: none;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--ink);
            font: inherit;
            font-size: 14px;
            line-height: 1.55;
            padding: 10px;
        }
        .chat-input::placeholder { color: #a89b90; }
        .send-btn {
            width: 44px;
            height: 44px;
            border: 0;
            border-radius: 15px;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            background: var(--dark);
            color: #fff7ee;
            cursor: pointer;
        }
        .send-btn:disabled {
            cursor: not-allowed;
            opacity: 0.44;
        }

        .docket {
            border-radius: 34px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--dark);
            color: #fff7ee;
        }
        .docket-hero {
            padding: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }
        .avatar-card {
            padding: 12px;
            border-radius: 24px;
            background:
                linear-gradient(145deg, rgba(255,247,238,0.1), rgba(215,107,31,0.2));
            border: 1px solid rgba(255,247,238,0.13);
        }
        .avatar-card img {
            width: 100%;
            aspect-ratio: 1;
            display: block;
            border-radius: 18px;
            object-fit: cover;
        }
        .docket-info {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        .docket-kicker {
            margin: 0 0 10px;
            color: #c78357;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .panel-name {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
        }
        .panel-level {
            margin: 6px 0 20px;
            color: #bdae9f;
            font-size: 13px;
        }
        .info-row {
            display: grid;
            grid-template-columns: minmax(82px, auto) 1fr;
            gap: 12px;
            padding: 13px 0;
            border-top: 1px solid rgba(255,255,255,0.11);
        }
        .info-label {
            color: #bdae9f;
            font-size: 12px;
        }
        .info-value {
            color: #fff7ee;
            font-size: 13px;
            font-weight: 800;
            text-align: right;
        }
        .empty-state {
            padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.11);
            color: #bdae9f;
            font-size: 13px;
            line-height: 1.7;
        }
        .panel-quick {
            padding: 0 20px 20px;
        }
        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .quick-btn {
            min-height: 42px;
            border: 1px solid rgba(255,247,238,0.14);
            border-radius: 14px;
            background: var(--dark-soft);
            color: #f2dfcc;
            font: inherit;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
        }
        .quick-btn:hover {
            border-color: rgba(215,107,31,0.46);
            color: #fff7ee;
        }

        .init-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            place-items: center;
            background: rgba(248,239,228,0.88);
            backdrop-filter: blur(16px);
            transition: opacity 0.35s ease;
        }
        .init-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .init-card {
            width: min(330px, calc(100vw - 40px));
            padding: 18px;
            border-radius: 28px;
            background: rgba(255,250,243,0.82);
            border: 1px solid rgba(255,255,255,0.76);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .init-card img {
            width: 86px;
            height: 86px;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 14px;
        }
        .init-status {
            color: var(--ink);
            font-size: 15px;
            font-weight: 800;
        }
        .init-sub {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
        }
        .init-spinner {
            width: 26px;
            height: 26px;
            margin: 16px auto 0;
            border: 3px solid rgba(215,107,31,0.18);
            border-top-color: var(--orange);
            border-radius: 999px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 980px) {
            body { overflow: auto; }
            .app-layout {
                min-height: 100vh;
                height: auto;
                grid-template-columns: 1fr;
                padding: 10px;
            }
            .docket { display: none; }
            .desk { min-height: calc(100vh - 20px); }
            .chat-header { padding: 16px; }
            .header-actions { display: none; }
            .chat-messages { padding: 18px; }
            .message-row { max-width: 96%; }
        }
    </style>
</head>
<body>
    <div id="initOverlay" class="init-overlay">
        <div class="init-card">
            <img src="/static/assets/hommey-avatar.jpg" alt="">
            <div class="init-status">Hommey 正在整理你的旅行空间</div>
            <div class="init-sub">首次加载需要几秒钟</div>
            <div class="init-spinner"></div>
        </div>
    </div>

    <div class="app-layout">
        <main class="desk">
            <header class="chat-header">
                <img class="assistant-avatar" src="/static/assets/hommey-avatar.jpg" alt="Hommey">
                <div class="title-block">
                    <div class="eyebrow">Private travel desk</div>
                    <h1>Hommey</h1>
                    <p>把复杂差旅整理成一张安静的计划。</p>
                </div>
                <div class="header-actions">
                    <div class="user-chip">
                        <span class="user-dot">{{ user_id[0:1].upper() if user_id else 'U' }}</span>
                        <span>{{ user_id }}</span>
                    </div>
                    <a class="logout-link" href="/" title="切换用户" aria-label="切换用户">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <path d="m16 17 5-5-5-5"/>
                            <path d="M21 12H9"/>
                        </svg>
                    </a>
                </div>
            </header>

            <div id="chatMessages" class="chat-messages"></div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" class="chat-input" rows="1" placeholder="告诉 Hommey 你的出行需求，例如：下周一去上海出差两天" disabled></textarea>
                    <button id="sendBtn" class="send-btn" disabled aria-label="发送">
                        <svg class="send-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
                        </svg>
                    </button>
                </div>
            </footer>
        </main>

        <aside class="docket">
            <div class="docket-hero">
                <div class="avatar-card">
                    <img src="/static/assets/hommey-avatar.jpg" alt="Hommey 简约像素短发少女头像">
                </div>
            </div>
            <div class="docket-info">
                <p class="docket-kicker">Travel Docket</p>
                <p id="panelName" class="panel-name">您好，{{ user_id }}</p>
                <p id="panelLevel" class="panel-level">加载中...</p>
                <div id="prefList">
                    <div class="empty-state">正在读取你的偏好。</div>
                </div>
            </div>
            <div class="panel-quick">
                <p class="docket-kicker">Quick Ask</p>
                <div class="quick-grid">
                    <button class="quick-btn" type="button" data-quick="帮我规划去北京的行程">规划行程</button>
                    <button class="quick-btn" type="button" data-quick="北京的天气怎么样">查询天气</button>
                    <button class="quick-btn" type="button" data-quick="出差住宿标准是多少">差旅标准</button>
                    <button class="quick-btn" type="button" data-quick="查看我的历史行程">历史记录</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
