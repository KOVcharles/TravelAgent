<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Hommey</title>
    <link rel="stylesheet" href="/static/hommey.css">
</head>
<body class="chat-page" data-user-id="{{ user_id }}">
    <div id="initOverlay" class="init-overlay">
        <div class="init-card">
            <span class="mini-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M6 12h12"/></svg>
            </span>
            <div class="init-status">正在准备 Hommey</div>
            <div class="init-sub">首次加载可能需要几秒钟</div>
        </div>
    </div>

    <div id="appShell" class="app-shell" data-view="home">
        <header class="topbar">
            <div class="topbar-group">
                <button id="sidebarToggle" class="icon-button" type="button" aria-label="打开侧栏">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M9 4v16"/></svg>
                </button>
                <button id="homeButton" class="product-home" type="button">
                    <span class="mini-logo">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M6 12h12"/></svg>
                    </span>
                    <span>Hommey</span>
                </button>
            </div>
            <div class="topbar-group">
                <button id="accountButton" class="avatar-button" type="button" aria-label="打开账户设置">
                    {{ user_id[0:1].upper() if user_id else 'U' }}
                </button>
            </div>
        </header>

        <main id="welcomeView" class="screen welcome-view">
            <div class="welcome-inner">
                <svg class="route-intro" viewBox="0 0 500 88" aria-hidden="true">
                    <path d="M20 59 C104 59, 116 17, 208 29 S335 82, 480 27"/>
                    <path class="route-progress" d="M20 59 C104 59, 116 17, 208 29 S335 82, 480 27"/>
                    <circle cx="20" cy="59" r="4"/>
                    <circle cx="480" cy="27" r="4"/>
                    <circle class="traveller" cx="0" cy="0" r="3"/>
                </svg>
                <h1 class="welcome-title">出发前，问问 Hommey。<br><span>路线、标准和细节，一次理清。</span></h1>

                <form id="homeComposer" class="composer welcome-composer">
                    <textarea id="homeInput" rows="1" placeholder="今天想去哪儿？" aria-label="输入差旅需求" disabled></textarea>
                    <div class="composer-tools">
                        <span class="mode-badge">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s7-4 7-11V5l-7-3-7 3v6c0 7 7 11 7 11Z"/><path d="m9 12 2 2 4-4"/></svg>
                            <span>企业差旅</span>
                        </span>
                        <span class="composer-spacer"></span>
                        <button id="homeSendBtn" class="send-button" type="submit" aria-label="发送" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5"/><path d="m6 11 6-6 6 6"/></svg>
                        </button>
                    </div>
                </form>

                <button id="promptRotator" class="prompt-rotator" type="button" data-prompt="下周一去上海出差两天，帮我规划行程">
                    <span class="prompt-label">试试问</span>
                    <span class="prompt-window"><span id="rotatingQuestion" class="rotating-question">下周一去上海两天，帮我安排一下</span></span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m9 18 6-6-6-6"/></svg>
                </button>
                <p class="privacy-note">重要的动态信息请以官方来源为准。</p>
            </div>
        </main>

        <main id="conversationView" class="screen conversation-view">
            <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
            <footer class="chat-composer-shell">
                <div class="composer">
                    <textarea id="chatInput" rows="1" placeholder="继续问 Hommey" aria-label="继续提问" disabled></textarea>
                    <div class="composer-tools">
                        <span class="mode-badge">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s7-4 7-11V5l-7-3-7 3v6c0 7 7 11 7 11Z"/></svg>
                            <span>企业差旅</span>
                        </span>
                        <span class="composer-spacer"></span>
                        <button id="sendBtn" class="send-button" type="button" aria-label="发送" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5"/><path d="m6 11 6-6 6 6"/></svg>
                        </button>
                    </div>
                </div>
                <p class="disclaimer">Hommey 可能会出错，请核对重要的出行信息。</p>
            </footer>
        </main>
    </div>

    <button id="scrim" class="scrim" type="button" aria-label="关闭侧栏"></button>

    <aside id="sidebar" class="sidebar" aria-label="会话侧栏">
        <div class="sidebar-head">
            <div class="sidebar-brand-row">
                <div class="sidebar-brand">
                    <span class="mini-logo">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M6 12h12"/></svg>
                    </span>
                    <span>Hommey</span>
                </div>
                <button id="sidebarClose" class="icon-button" type="button" aria-label="关闭侧栏">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M9 4v16"/></svg>
                </button>
            </div>
            <div class="sidebar-actions">
                <button id="newChatButton" class="sidebar-action" type="button">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg>
                    <span>新对话</span>
                </button>
                <button id="searchToggle" class="sidebar-action" type="button">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
                    <span>搜索会话</span>
                </button>
                <label id="historySearchBox" class="history-search">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
                    <input id="historySearch" type="search" placeholder="输入会话名称">
                </label>
            </div>
        </div>
        <div id="historyList" class="history-list">
            <p class="history-label">最近</p>
            <div class="history-empty">还没有历史会话。</div>
        </div>
        <div class="sidebar-foot">
            <button id="settingsButton" class="sidebar-action" type="button">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.2 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H2.4a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.2 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 8.6 4.2a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V2.4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.71 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 8.6c.14.4.36.75.6 1 .3.3.7.4 1.1.4h.1a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.71 1Z"/></svg>
                <span>设置</span>
            </button>
            <button id="accountRow" class="account-row" type="button">
                <span class="account-avatar">{{ user_id[0:1].upper() if user_id else 'U' }}</span>
                <span class="account-copy"><strong id="panelName">{{ user_id }}</strong><span id="panelLevel">个人账户</span></span>
                <span>›</span>
            </button>
        </div>
    </aside>

    <div id="sessionPopover" class="session-popover" hidden>
        <button id="renameSessionButton" type="button">重命名</button>
        <button id="deleteSessionButton" class="danger" type="button">删除</button>
    </div>

    <section id="settingsLayer" class="modal-layer" aria-label="设置">
        <div class="settings-modal">
            <header class="modal-head">
                <h2>设置</h2>
                <button id="settingsClose" class="icon-button" type="button" aria-label="关闭">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m6 6 12 12M18 6 6 18"/></svg>
                </button>
            </header>
            <div class="settings-body">
                <section class="settings-section">
                    <p class="settings-label">外观</p>
                    <div class="settings-card">
                        <div class="setting-row">
                            <div><div class="setting-title">显示模式</div><div class="setting-note">默认跟随系统</div></div>
                            <div class="theme-tabs">
                                <button class="theme-tab active" type="button" data-theme-option="system">自动</button>
                                <button class="theme-tab" type="button" data-theme-option="light">浅色</button>
                                <button class="theme-tab" type="button" data-theme-option="dark">深色</button>
                            </div>
                        </div>
                        <div class="setting-row">
                            <div><div class="setting-title">界面动效</div><div class="setting-note">路线和界面过渡</div></div>
                            <button id="motionToggle" class="toggle on" type="button" role="switch" aria-checked="true"></button>
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <p class="settings-label">个人信息</p>
                    <div class="settings-card">
                        <details class="settings-details">
                            <summary><span>差旅偏好</span><span>›</span></summary>
                            <div id="prefList" class="pref-list"><div class="empty-state">正在读取偏好。</div></div>
                        </details>
                        <details class="settings-details">
                            <summary><span>当前出差任务</span><span>›</span></summary>
                            <div id="activeTrip" class="active-trip"><div class="empty-state">正在读取行程。</div></div>
                        </details>
                    </div>
                </section>

                <section class="settings-section">
                    <p class="settings-label">数据与账户</p>
                    <div class="settings-card">
                        <button id="clearHistoryButton" class="settings-action" type="button"><span>清空聊天记录</span><span>›</span></button>
                        <a id="adminLink" href="/admin/skills" hidden>Skill 管理</a>
                        <a class="settings-action danger logout-link" href="/"><span>退出登录</span><span>›</span></a>
                    </div>
                </section>
            </div>
        </div>
    </section>

    <section id="renameLayer" class="modal-layer" aria-label="重命名会话">
        <form id="renameForm" class="small-modal">
            <h2>重命名会话</h2>
            <p>输入一个简短、容易识别的名称。</p>
            <input id="renameInput" class="modal-input" type="text" maxlength="80" required>
            <div class="modal-actions">
                <button class="secondary-button" type="button" data-close-layer="renameLayer">取消</button>
                <button class="primary-button" type="submit">保存</button>
            </div>
        </form>
    </section>

    <section id="confirmLayer" class="modal-layer" aria-label="确认操作">
        <div class="small-modal">
            <h2 id="confirmTitle">确认删除</h2>
            <p id="confirmMessage">删除后无法恢复。</p>
            <div class="modal-actions">
                <button class="secondary-button" type="button" data-close-layer="confirmLayer">取消</button>
                <button id="confirmAction" class="danger-button" type="button">删除</button>
            </div>
        </div>
    </section>

    <div id="toast" class="toast" role="status"></div>
    <script src="/static/app.js"></script>
</body>
</html>
