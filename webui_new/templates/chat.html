<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hommey 商旅助手 - {{ user_id }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'DM Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B1120;
            color: #F1F5F9;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* ── Layout ── */
        .app-layout {
            display: flex;
            height: 100vh;
            gap: 8px;
            padding: 8px;
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Left nav */
        .nav-bar {
            width: 56px;
            flex-shrink: 0;
            background: #0F172A;
            border-radius: 16px;
            border: 1px solid #1E293B;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 4px;
        }
        .nav-logo {
            width: 32px; height: 32px;
            border-radius: 10px;
            background: linear-gradient(135deg, #3B82F6, #6366F1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .nav-item {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #475569;
            transition: all 0.15s ease;
            cursor: pointer;
            position: relative;
        }
        .nav-item:hover { color: #94A3B8; background: #1E293B; }
        .nav-item.active { color: #3B82F6; }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -8px;
            width: 3px; height: 18px;
            background: #3B82F6;
            border-radius: 4px;
        }
        .nav-spacer { flex: 1; }

        /* Middle - Chat */
        .chat-area {
            flex: 1;
            min-width: 0;
            background: #0F172A;
            border-radius: 16px;
            border: 1px solid #1E293B;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 14px 24px;
            border-bottom: 1px solid #1E293B;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #1E293B;
            flex-shrink: 0;
        }

        /* Messages */
        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            max-width: 85%;
            animation: messageIn 0.3s ease;
        }
        .message-row.user {
            flex-direction: row-reverse;
            align-self: flex-end;
        }
        .message-row.ai { align-self: flex-start; }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
        }
        .msg-avatar.ai {
            background: linear-gradient(135deg, #3B82F6, #6366F1);
            color: white;
        }
        .msg-avatar.user {
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            color: white;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
        }
        .msg-bubble.ai {
            background: #1E293B;
            color: #E2E8F0;
            border-radius: 12px 12px 12px 4px;
        }
        .msg-bubble.user {
            background: #3B82F6;
            color: white;
            border-radius: 12px 12px 4px 12px;
        }
        .msg-time {
            font-size: 11px;
            color: #475569;
            margin-top: 4px;
        }
        .message-row.user .msg-time { text-align: right; }

        /* Agent processing indicator */
        .agent-indicator {
            background: #1E293B;
            border-radius: 12px 12px 12px 4px;
            padding: 14px 18px;
            min-width: 200px;
        }
        .agent-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .agent-tag {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 6px;
            font-weight: 500;
        }
        .agent-tag.pending {
            background: #1E3A5F;
            color: #93C5FD;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .agent-tag.active {
            background: #1E3A5F;
            color: #93C5FD;
            border: 1px solid #3B82F6;
            animation: tagPulse 1.5s ease-in-out infinite;
        }
        @keyframes tagPulse {
            0%, 100% { border-color: rgba(59,130,246,0.3); }
            50% { border-color: rgba(59,130,246,0.8); }
        }
        .agent-tag.done {
            background: rgba(34,197,94,0.1);
            color: #4ADE80;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .typing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #475569;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); background: #475569; }
            40% { transform: scale(1); background: #3B82F6; }
        }

        /* Thinking message (the "正在处理" state) */
        .thinking-text {
            color: #94A3B8;
            font-size: 13px;
        }

        /* Input */
        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #0B1120;
            border: 1px solid #1E293B;
            border-radius: 12px;
            padding: 4px;
            transition: all 0.2s ease;
        }
        .input-wrapper:focus-within {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #F1F5F9;
            font-size: 14px;
            font-family: inherit;
            padding: 10px 12px;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
        }
        .chat-input::placeholder { color: #475569; }
        .send-btn {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: #3B82F6;
            border: none;
            color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #2563EB; }
        .send-btn:disabled {
            background: #1E293B;
            color: #475569;
            cursor: not-allowed;
        }
        .send-btn.loading {
            background: #1E293B;
            cursor: wait;
        }

        /* Right panel */
        .right-panel {
            width: 260px;
            flex-shrink: 0;
            background: #0F172A;
            border-radius: 16px;
            border: 1px solid #1E293B;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-greeting {
            background: linear-gradient(135deg, rgba(59,130,246,0.08), transparent);
            padding: 24px 20px 18px;
            border-bottom: 1px solid rgba(59,130,246,0.08);
        }
        .panel-info {
            padding: 16px 20px;
            flex: 1;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .info-row + .info-row { border-top: 1px solid #1E293B; }
        .info-label { color: #64748B; font-size: 12px; }
        .info-value { color: #E2E8F0; font-size: 12px; font-weight: 500; }
        .panel-quick {
            padding: 12px 16px 16px;
        }
        .quick-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }
        .quick-btn {
            font-size: 11px;
            color: #94A3B8;
            padding: 8px 0;
            border-radius: 8px;
            background: #1E293B;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s ease;
        }
        .quick-btn:hover {
            color: #E2E8F0;
            border-color: #334155;
            background: #263548;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1E293B 25%, #263548 50%, #1E293B 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Overlay */
        .init-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11,17,32,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        .init-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .init-spinner {
            width: 48px; height: 48px;
            border: 3px solid #1E293B;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .init-status {
            margin-top: 20px;
            color: #94A3B8;
            font-size: 15px;
        }
        .init-sub {
            margin-top: 8px;
            color: #475569;
            font-size: 13px;
        }

        /* Welcome message markdown */
        .msg-bubble strong { color: #F1F5F9; font-weight: 600; }
        .msg-bubble p { margin: 4px 0; }

        /* Responsive */
        @media (max-width: 900px) {
            .right-panel { display: none; }
            .app-layout { padding: 4px; gap: 4px; }
        }
        @media (max-width: 640px) {
            .nav-bar { width: 44px; border-radius: 12px; }
            .chat-header { padding: 10px 16px; }
            .chat-messages { padding: 16px; }
            .message-row { max-width: 95%; }
        }
    </style>
</head>
<body>
    <!-- Init Overlay -->
    <div id="initOverlay" class="init-overlay">
        <div class="init-spinner"></div>
        <div class="init-status">正在为您初始化系统...</div>
        <div class="init-sub">首次加载需要几秒钟</div>
    </div>

    <!-- Main Layout -->
    <div class="app-layout">
        <!-- Left Nav -->
        <nav class="nav-bar">
            <div class="nav-logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div style="height:4px;width:4px;border-radius:50%;background:#334155;margin:4px 0;"></div>
            <div class="nav-item active" title="对话">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="nav-item" title="历史行程">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="nav-item" title="偏好设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <div class="nav-spacer"></div>
            <div class="nav-item" title="设置" onclick="window.location.href='/'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
        </nav>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <div class="chat-header">
                <div>
                    <span style="font-weight:600;font-size:14px;">Hommey 商旅助手</span>
                    <span id="statusDot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#22C55E;margin-left:8px;vertical-align:middle;"></span>
                    <span id="statusText" style="color:#22C55E;font-size:11px;margin-left:4px;">在线</span>
                </div>
                <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
                    <span style="color:#475569;font-size:12px;">{{ user_id }}</span>
                    <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366F1,#4F46E5);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;">
                        {{ user_id[0:1].upper() if user_id else 'U' }}
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div id="chatMessages" class="chat-messages">
                <!-- Welcome message will be inserted by JS after init -->
            </div>

            <!-- Input -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea
                        id="chatInput"
                        class="chat-input"
                        rows="1"
                        placeholder="输入您的出行需求，例如：下周一要去上海出差两天"
                        disabled
                    ></textarea>
                    <button id="sendBtn" class="send-btn" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <div id="panelGreeting" class="panel-greeting">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div id="panelAvatar" style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#6366F1);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;">
                        {{ user_id[0:1].upper() if user_id else '?' }}
                    </div>
                    <div>
                        <p id="panelName" style="margin:0;color:#F1F5F9;font-size:14px;font-weight:600;">您好，{{ user_id }}</p>
                        <p id="panelLevel" style="margin:2px 0 0 0;color:#475569;font-size:11px;">加载中...</p>
                    </div>
                </div>
            </div>
            <div id="panelInfo" class="panel-info">
                <p style="color:#64748B;font-size:10px;font-weight:600;letter-spacing:1px;margin:0 0 10px 0;">个人资料</p>
                <div id="prefList">
                    <!-- Preference rows loaded by JS -->
                    <div style="padding:12px 0;text-align:center;color:#475569;font-size:12px;">加载偏好中...</div>
                </div>
            </div>
            <div class="panel-quick">
                <div class="quick-grid">
                    <div class="quick-btn" data-quick="帮我规划去北京的行程">✈️ 行程</div>
                    <div class="quick-btn" data-quick="北京的天气怎么样">🌤️ 天气</div>
                    <div class="quick-btn" data-quick="出差住宿标准是多少">📋 标准</div>
                    <div class="quick-btn" data-quick="查看我的历史行程">📅 记录</div>
                </div>
            </div>
        </aside>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
